<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="calculator">
    <h1>Calculator</h1>

    <section class="calculator-box">
      <input
        type="text"
        id="display"
        class="display"
        value="0"
        readonly
        aria-label="Calculator display"
      >

      <div class="buttons">
        <button class="btn btn-action" data-action="clear">C</button>
        <button class="btn btn-action" data-action="delete">DEL</button>
        <button class="btn btn-operator" data-value="%">%</button>
        <button class="btn btn-operator" data-value="/">/</button>

        <button class="btn" data-value="7">7</button>
        <button class="btn" data-value="8">8</button>
        <button class="btn" data-value="9">9</button>
        <button class="btn btn-operator" data-value="*">*</button>

        <button class="btn" data-value="4">4</button>
        <button class="btn" data-value="5">5</button>
        <button class="btn" data-value="6">6</button>
        <button class="btn btn-operator" data-value="-">-</button>

        <button class="btn" data-value="1">1</button>
        <button class="btn" data-value="2">2</button>
        <button class="btn" data-value="3">3</button>
        <button class="btn btn-operator" data-value="+">+</button>

        <button class="btn btn-zero" data-value="0">0</button>
        <button class="btn" data-value=".">.</button>
        <button class="btn btn-equals" data-action="calculate">=</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
